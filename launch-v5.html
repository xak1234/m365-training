          <div style={cd2}><div style={{fontWeight:600,fontSize:12,marginBottom:4}}>Registration</div>{kv("Total Active Users",SSPR.registration.total.toString())}{kv("Registered for SSPR",SSPR.registration.registered.toString(),pct(SSPR.registration.registered,SSPR.registration.total)>70?X.ok:X.wn)}{kv("SSPR Capable (MFA+SSPR)",SSPR.registration.capable.toString())}{bar2(SSPR.registration.registered,SSPR.registration.total,X.ok)}</div>
        </div>
        <div style={g22}>
          <div style={cd2}><div style={{fontWeight:600,fontSize:12,marginBottom:4}}>🔒 Smart Lockout</div>{kv("Lockout Threshold",SSPR.lockout.threshold+" attempts")}{kv("Lockout Duration",SSPR.lockout.duration+"s")}{kv("Smart Lockout",SSPR.lockout.smartLockout?"Enabled":"Disabled",X.ok)}</div>
          <div style={cd2}><div style={{fontWeight:600,fontSize:12,marginBottom:4}}>🚫 Banned Passwords</div>{kv("Custom Ban List","Enabled",X.ok)}<div style={{marginTop:3}}>{SSPR.banPw.custom.map(w=><span key={w} style={{...bg2(X.er),marginRight:3,marginBottom:2,display:"inline-block"}}>{w}</span>)}</div></div>
        </div>
        {hd("📋 Recent SSPR Activity")}
        {SSPR.activity.map((a,i)=>{const usr=U.find(u=>u.id===a.u);return <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+X.pb+"44",fontSize:10}}><div style={{display:"flex",alignItems:"center",gap:3}}>{usr&&av2(usr,14)}<span>{usr?.n} — {a.action}</span></div><div><span style={{color:X.t3}}>{fT(a.time)}</span> <span style={bg2(X.ok)}>{a.method}</span></div></div>;})}
      </div>}

      {et === "authmeth" && <div>{hd("🔐 Authentication Methods Policy")}<table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}><thead><tr style={{background:X.bg}}>{["Method","Status","Target","Passwordless","Number Match","Registration %"].map(h=><th key={h} style={th3}>{h}</th>)}</tr></thead><tbody>{AUTH_METHODS.map(m=><tr key={m.method}><td style={{...td3,fontWeight:600}}>{m.method}</td><td style={td3}><span style={bg2(m.status==="Enabled"?X.ok:X.er)}>{m.status}</span></td><td style={{...td3,color:X.t2}}>{m.target}</td><td style={td3}><span style={bg2(m.passwordless?X.ok:X.t3)}>{m.passwordless?"Yes":"No"}</span></td><td style={td3}>{m.numMatch?"Yes":"—"}</td><td style={{...td3,minWidth:80}}>{m.regPct>0?bar2(m.regPct,100,X.a):"—"}</td></tr>)}</tbody></table></div>}

      {et === "named" && <div>{hd("📍 Named Locations")}{NAMED_LOCS.map(l=><div key={l.name} style={{...cd2,borderLeft:"3px solid "+(l.trusted?X.ok:X.er)}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{l.name}</span><div style={{display:"flex",gap:3}}><span style={bg2(l.type==="Countries"?X.er:X.a)}>{l.type}</span><span style={bg2(l.trusted?X.ok:X.er)}>{l.trusted?"Trusted":"Untrusted"}</span>{l.mfaSkip&&<span style={bg2(X.wn)}>MFA Skip</span>}</div></div><div style={{fontSize:10,color:X.t3,fontFamily:"monospace",marginTop:2}}>{l.ranges?l.ranges.join(", "):l.countries?.join(", ")}</div></div>)}</div>}

      {et === "risk" && <div>{hd("⚠️ Risk Detections")}{RISK_DET.map(r=>{const usr=U.find(u=>u.id===r.user);return <div key={r.id} style={{...cd2,borderLeft:"3px solid "+({High:X.er,Medium:X.wn,Low:X.ok}[r.level])}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{r.type}</span><div style={{display:"flex",gap:3}}><span style={bg2({High:X.er,Medium:X.wn,Low:X.ok}[r.level])}>{r.level}</span><span style={bg2(r.remediated?X.ok:X.er)}>{r.remediated?"Remediated":"At Risk"}</span></div></div><div style={{fontSize:10,color:X.t2,marginTop:2}}>{r.detail}</div><div style={{fontSize:9,color:X.t3,marginTop:1}}>User: {usr?.n} ({usr?.e}) · {fD(r.time)} {fT(r.time)}</div></div>;})}
      </div>}

      {et === "reviews" && <div>{hd("📋 Access Reviews")}{ACCESS_REVIEWS.map(r=><div key={r.name} style={{...cd2,borderLeft:"3px solid "+(r.status==="InProgress"?X.wn:r.status==="Completed"?X.ok:X.t3)}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{r.name}</span><span style={bg2(r.status==="InProgress"?X.wn:r.status==="Completed"?X.ok:X.t3)}>{r.status}</span></div><div style={{fontSize:10,marginTop:3}}>{kv("Scope",r.scope)}{kv("Due",r.due)}{kv("Reviewer",U.find(u=>u.id===r.reviewer)?.n||r.reviewer)}{kv("Progress",r.reviewed+"/"+r.total+" reviewed")}{kv("If not reviewed",r.autoAction)}</div>{r.status==="InProgress"&&bar2(r.reviewed,r.total,X.wn)}</div>)}</div>}

      {et === "appreg" && <div>{hd("📦 App Registrations")}{APP_REGS.map(a=><div key={a.appId} style={{...cd2,borderLeft:"3px solid "+(a.status.includes("EXPIRED")?X.er:a.status.includes("expiring")||a.status.includes("No owner")?X.wn:X.ok)}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{a.name}</span><span style={bg2(a.status.includes("Healthy")?X.ok:a.status.includes("EXPIRED")?X.er:X.wn)}>{a.status}</span></div><div style={{fontSize:10,marginTop:3}}>{kv("App ID",a.appId)}{kv("Type",a.type)}{kv("Secrets",a.secrets+" (expires: "+a.secretExpiry+")",a.status.includes("EXPIRED")?X.er:X.ok)}{kv("Certificates",a.certs.toString())}{kv("Owners",a.owners.length>0?a.owners.map(id=>U.find(u=>u.id===id)?.n).join(", "):"⚠ None",a.owners.length?X.ok:X.er)}{kv("Permissions",a.permissions.join(", ")+" ("+a.permType+")")}</div></div>)}</div>}

      {et === "ca" && <div>{hd("🔒 Conditional Access Policies")}{CA_D.map(c=><div key={c.n} style={{...cd2,borderLeft:"3px solid "+(c.st==="On"?X.ok:X.wn)}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{c.n}</span><span style={bg2(c.st==="On"?X.ok:X.wn)}>{c.st}</span></div><div style={{fontSize:10,marginTop:3}}>{kv("Conditions",c.c)}{kv("Grant",c.g)}</div></div>)}</div>}

      {et === "audit" && <div>{hd("📊 Audit Log (Recent)")}<table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}><thead><tr style={{background:X.bg}}>{["Time","Actor","Activity","Target","Result","Category"].map(h=><th key={h} style={th3}>{h}</th>)}</tr></thead><tbody>{AUDIT_LOG.map((l,i)=>{const usr=l.actor!=="System"?U.find(u=>u.id===l.actor):null;return <tr key={i}><td style={{...td3,whiteSpace:"nowrap"}}>{fT(l.time)}</td><td style={td3}>{usr?<div style={{display:"flex",alignItems:"center",gap:3}}>{av2(usr,14)}{usr.n}</div>:<span style={{color:X.t3}}>System</span>}</td><td style={{...td3,fontWeight:600}}>{l.activity}</td><td style={{...td3,color:X.t2,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis"}}>{l.target}</td><td style={td3}><span style={bg2(l.result.includes("Success")?X.ok:X.wn)}>{l.result}</span></td><td style={td3}><span style={bg2(X.a)}>{l.cat}</span></td></tr>})}</tbody></table></div>}
    </div>}

    {/* OTHER PANELS (compact) */}
    {at === "sec" && <div>{hd("🚨 Security Alerts")}{[...RISK_DET.filter(r=>!r.remediated)].map(a=>{const usr=U.find(u=>u.id===a.user);return <div key={a.id} style={{...cd2,borderLeft:"3px solid "+({High:X.er,Medium:X.wn,Low:X.ok}[a.level])}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:11}}>{a.type}</span><span style={bg2({High:X.er,Medium:X.wn}[a.level]||X.ok)}>{a.level}</span></div><div style={{fontSize:10,color:X.t2}}>{a.detail}</div><div style={{fontSize:9,color:X.t3}}>User: {usr?.n} · {fT(a.time)}</div></div>})}{hd("🔏 DLP Policies")}{DLP_D.map(d=><div key={d.n} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+X.pb+"44",fontSize:11}}><span style={{fontWeight:600}}>{d.n}</span><div style={{display:"flex",gap:3}}><span style={bg2(d.st==="Enforcing"?X.ok:X.wn)}>{d.st}</span><span style={bg2(d.ma>10?X.wn:X.ok)}>{d.ma}</span></div></div>)}</div>}

    {at === "exch" && <div>{hd("📬 Shared Mailboxes")}<div style={g22}>{SHARED_MBX.map(m=><div key={m.n} style={cd2}><div style={{fontWeight:600,fontSize:11}}>{m.n}</div>{bar2(m.sz,50,X.Exchange)}</div>)}</div>{hd("🏢 Meeting Rooms")}<div style={g22}>{ROOMS.map(r=><div key={r.n} style={cd2}><div style={{fontWeight:600,fontSize:11}}>{r.n}</div><div style={{fontSize:10,color:X.t3}}>{r.loc} · Cap: {r.cap}</div></div>)}</div></div>}

    {at === "outlook" && <div>{hd("📨 Outlook Configuration")}<div style={g22}><div style={cd2}><div style={{fontWeight:600,fontSize:12,marginBottom:4}}>Anti-Spam/Malware</div>{[["Spam filter","On"],["Safe Attachments (E5)","On"],["Safe Links (E5)","On"],["ZAP","On"]].map(([k,v])=>kv(k,v,X.ok))}</div><div style={cd2}><div style={{fontWeight:600,fontSize:12,marginBottom:4}}>Email Auth (SPF/DKIM/DMARC)</div>{[["SPF","Valid"],["DKIM","Enabled"],["DMARC","p=quarantine"]].map(([k,v])=>kv(k,v,X.ok))}</div></div></div>}

    {at === "teams" && <div>{hd("💬 Teams")}<div style={g22}>{TEAMS_D.map(t=><div key={t.n} style={cd2}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{t.n}</span>{t.prv>0&&<span style={bg2(X.wn)}>🔒 {t.prv} private</span>}</div><div style={{fontSize:10,color:X.t3}}>{t.ch} channels · {t.mem} members</div></div>)}</div></div>}

    {at === "sp" && <div>{hd("📄 SharePoint Sites")}<div style={g22}>{SP_D.map(s=><div key={s.n} style={cd2}><div style={{fontWeight:600,fontSize:12}}>{s.n}</div>{bar2(s.sz,s.qt,X.SharePoint)}</div>)}</div></div>}

    {at === "intune" && <div>{hd("📱 Intune Devices")}<div style={{display:"flex",gap:5,marginBottom:8}}>{[{l:"Compliant",v:U.filter(u=>u.co==="Compliant").length,c:X.ok},{l:"Non-Compliant",v:U.filter(u=>u.co!=="Compliant").length,c:X.er}].map(s=><div key={s.l} style={{...cd2,flex:1,borderTop:"3px solid "+s.c,textAlign:"center"}}><div style={{fontSize:9,color:X.t3}}>{s.l}</div><div style={{fontSize:18,fontWeight:700}}>{s.v}</div></div>)}</div></div>}

    {at === "power" && <div>{hd("⚡ Power Platform")}{[{n:"Invoice Approval",st:"On",r:156,f:8},{n:"Employee Onboarding",st:"On",r:48,f:2},{n:"IT Ticket Escalation",st:"Suspended",r:23,f:12}].map(f=><div key={f.n} style={{...cd2,borderLeft:"3px solid "+(f.st==="On"?X.ok:X.er)}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{f.n}</span><span style={bg2(f.st==="On"?X.ok:X.er)}>{f.st}</span></div><div style={{fontSize:10,color:X.t3}}>Runs: {f.r} · Failures: {f.f}</div></div>)}</div>}

    {at === "purview" && <div>{hd("🔏 Purview")}<div style={g22}><div style={cd2}><div style={{fontWeight:600,fontSize:12,marginBottom:4}}>Sensitivity Labels</div>{[{n:"Public",c:X.ok,v:340},{n:"Internal",c:X.a,v:1250},{n:"Confidential",c:X.wn,v:420},{n:"Highly Confidential",c:X.er,v:85}].map(l=><div key={l.n} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",fontSize:10}}><span style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:7,height:7,borderRadius:2,background:l.c}}/>{l.n}</span><span style={{color:X.t2}}>{l.v}</span></div>)}</div><div style={cd2}><div style={{fontWeight:600,fontSize:12,marginBottom:4}}>Retention Policies</div>{[["Default 7yr","Exchange, SP, OD"],["Finance 10yr","Finance SP"],["Legal Hold","Legal mailboxes"]].map(([n,s])=><div key={n} style={{fontSize:10,padding:"2px 0",borderBottom:"1px solid "+X.pb+"33"}}><span style={{fontWeight:600}}>{n}</span><span style={{color:X.t3,marginLeft:4}}>{s}</span></div>)}</div></div></div>}

    {at === "lic" && <div>{hd("📋 Licenses")}<div style={g22}>{LICS.map(l=><div key={l.n} style={cd2}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontWeight:600,fontSize:11}}>{l.n}</span><span style={{fontSize:9,color:X.t3}}>{l.c}/user/mo</span></div>{bar2(l.u,l.t,X.a)}<div style={{fontSize:9,color:X.t3,marginTop:2}}>{l.t-l.u} available</div></div>)}</div></div>}
  </div>);

  // ═══════════════════════════════════════════════════════════
  // ROOT
  // ═══════════════════════════════════════════════════════════
  return (
    <div style={{ fontFamily: "'Segoe UI',-apple-system,sans-serif", background: X.bg, color: X.t1, minHeight: "100vh", display: "flex", flexDirection: "column", fontSize: 12 }}>
      <style>{`*{box-sizing:border-box;margin:0}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:${X.pb};border-radius:2px}@keyframes si{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}tr:hover{background:${X.ph}!important}button:hover{filter:brightness(1.15)}`}</style>
      <div style={{ background: "#070910", borderBottom: "1px solid " + X.pb, padding: "0 14px", display: "flex", alignItems: "center", height: 42, gap: 10, flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 24, height: 24, background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 11, color: "#fff" }}>M</div>
          <div><div style={{ fontWeight: 700, fontSize: 12 }}>M365 Admin Sim</div><div style={{ fontSize: 8, color: X.t4 }}>{TN.vanity} · Training</div></div>
        </div>
        <div style={{ display: "flex", gap: 1, marginLeft: 16 }}>
          <button onClick={() => setPg("dash")} style={nb2(pg === "dash")}>📊 Dashboard</button>
          <button onClick={() => setPg("tk")} style={nb2(pg === "tk" || pg === "dt")}>🎫 Tickets{oN > 0 && <span style={{ marginLeft: 2, padding: "0 4px", borderRadius: 7, background: X.er, color: "#fff", fontSize: 9 }}>{oN}</span>}</button>
          <button onClick={() => setPg("admin")} style={nb2(pg === "admin")}>🏢 Admin</button>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6 }}>
          {cN > 0 && <div style={{ padding: "2px 6px", borderRadius: 4, background: X.er + "20", color: X.er, fontSize: 9, fontWeight: 600, animation: "pu 1.5s infinite" }}>🚨 {cN}</div>}
          {bN > 0 && <div style={{ padding: "2px 6px", borderRadius: 4, background: X.wn + "20", color: X.wn, fontSize: 9, fontWeight: 600 }}>⏰ {bN}</div>}
          <span style={{ fontSize: 10, color: X.t2 }}>⭐ {Math.floor(sc.pt)}</span>
        </div>
      </div>
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        <div style={{ flex: 1, overflow: "auto", padding: 12 }}>
          {pg === "dash" && <Dash />}{pg === "tk" && <TkL />}{pg === "dt" && <TkD />}{pg === "admin" && <Adm />}
        </div>
        <div style={{ width: 170, borderLeft: "1px solid " + X.pb, background: X.p, overflow: "auto", flexShrink: 0, padding: 8, fontSize: 9 }}>
          <div style={{ fontWeight: 700, color: X.t3, fontSize: 8, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Activity</div>
          {lg.length === 0 && <div style={{ color: X.t4 }}>Start resolving!</div>}
          {lg.slice(0, 18).map((l, i) => <div key={i} style={{ padding: "2px 0", borderBottom: "1px solid " + X.pb + "44" }}><div>{l.m}</div><div style={{ color: X.t4, fontSize: 8 }}>{ago(Date.now() - l.t)}</div></div>)}
          <div style={{ fontWeight: 700, color: X.t3, fontSize: 8, textTransform: "uppercase", margin: "8px 0 3px" }}>Closed ({cl.length})</div>
          {cl.slice(0, 6).map(t => <div key={t.id} style={{ color: X.t4, padding: "1px 0" }}>{t.id}</div>)}
        </div>
      </div>
      {ts && <div style={{ position: "fixed", bottom: 14, right: 14, padding: "7px 14px", borderRadius: 5, background: ts.t === "s" ? X.ok : ts.t === "w" ? X.wn : X.a, color: "#fff", fontWeight: 600, fontSize: 11, zIndex: 9999, boxShadow: "0 6px 24px rgba(0,0,0,.5)", animation: "si .3s ease" }}>{ts.m}</div>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

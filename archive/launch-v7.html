.sidebar{width:var(--nav-w);background:var(--nav-bg);overflow-y:auto;overflow-x:hidden;flex-shrink:0;display:flex;flex-direction:column;transition:width .2s}
.sidebar.collapsed{width:48px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 14px;color:#e0e0e0;cursor:pointer;font-size:13px;border-left:3px solid transparent;white-space:nowrap;transition:background .1s}
.nav-item:hover{background:var(--nav-h)}
.nav-item.active{background:var(--nav-a);border-left-color:var(--p);color:#fff;font-weight:600}
.nav-item .nav-icon{width:20px;text-align:center;flex-shrink:0;font-size:15px}
.nav-sub{padding-left:36px;font-size:12px;color:#b3b3b3}

.nav-sub.active{color:#fff;font-weight:600;background:var(--nav-a)}
.nav-sep{height:1px;background:#333;margin:6px 12px}

.page-title{font-size:20px;font-weight:600;margin-bottom:4px;color:var(--tx)}
.page-sub{font-size:13px;color:var(--tx2);margin-bottom:20px}
.card{background:var(--card);border-radius:2px;box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}

.stat-card .stat-val{font-size:28px;font-weight:700;margin:4px 0 2px}
.stat-card .stat-lbl{font-size:12px;color:var(--tx2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-weight:600;font-size:12px;color:var(--tx2);border-bottom:1px solid var(--bdr);background:#faf9f8;position:sticky;top:0;z-index:1}
td{padding:9px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:hover{background:#f3f2f1}
.badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:600;white-space:nowrap}

.btn-sm{padding:4px 10px;font-size:12px}
.btn-ghost{background:transparent;color:var(--p);border:none;padding:4px 8px;font-size:12px;cursor:pointer}.btn-ghost:hover{background:#cce4f6}

.input:focus{border-color:var(--p);box-shadow:0 0 0 1px var(--p)}
.select{padding:6px 10px;border:1px solid var(--bdr);border-radius:4px;font-size:13px;color:var(--tx);background:#fff;cursor:pointer;outline:none;appearance:none;width:100%}

.kv-k{color:var(--tx2)}.kv-v{font-weight:600}

.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}

@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

// TICKET TEMPLATE GENERATOR (with validation checks)
// ═══════════════════════════════════════════════════════════════
function mkTickets(users,teams,sp,mbx,rooms,guests,apps,risk) {
  const active=users.filter(u=>u.ac&&!u.blocked);
  const noMfa=users.filter(u=>u.ac&&!u.mfa&&!u.blocked);
  const risky=users.filter(u=>u.ri!=="None"&&u.ac);
  const T=[];

  // 1. Onboard new hire
  const nn=pick(HIRE_NAMES); const ndp=pick(DEPTS);
  T.push({c:"Identity",p:"High",ti:"Onboard new hire: "+nn+" in "+ndp,de:"New employee "+nn+" starting Monday in "+ndp+". Create cloud account with E3 license. Verify they appear in the active user list.",h:"Go to Users → Active users → Create User. Set name, email, department, license to E3.",checks:us=>us.some(u=>u.n===nn&&u.dp===ndp&&u.ac),checkLabel:'User "'+nn+'" exists in '+ndp+' with active account',sla:120,nav:"users.active"});

  // 2. Block compromised user
  if(risky.length>0){const ru=pick(risky);T.push({c:"Security",p:"Critical",ti:"Suspicious sign-in: block "+ru.n,de:"High-risk sign-in detected for "+ru.n+" from suspicious location. Block sign-in immediately, revoke all sessions, and reset password.",h:"Go to Users → Active users → select user → Block sign-in, Revoke sessions, Reset password.",checks:us=>{const u=us.find(x=>x.id===ru.id);return u&&u.blocked&&u.sessions===0&&u.pw===td()},checkLabel:ru.n+": blocked + sessions revoked + password reset today",sla:30,nav:"users.active"});}

  // 3. MFA reset
  if(active.length>0){const mu=pick(active.filter(u=>u.mfa));if(mu)T.push({c:"Identity",p:"Medium",ti:mu.n+" — MFA reset (new phone)",de:mu.n+" replaced their phone. They cannot sign in because MFA challenge fails. Reset their MFA methods so they can re-register.",h:"Go to Users → Active users → select user → Reset MFA button.",checks:us=>{const u=us.find(x=>x.id===mu.id);return u&&!u.mfa&&u.mm==="None"},checkLabel:mu.n+": MFA cleared (method = None)",sla:120,nav:"users.active"});}

  // 4. License change
  if(active.length>0){const lu=pick(active.filter(u=>u.li==="E5"));if(lu)T.push({c:"Identity",p:"Low",ti:lu.n+" — downgrade license E5 → E3",de:"Manager approved license downgrade for "+lu.n+". Change from E5 to E3.",h:"Go to Users → Active users → select user → Change license dropdown to E3.",checks:us=>{const u=us.find(x=>x.id===lu.id);return u&&u.li==="E3"},checkLabel:lu.n+": license = E3",sla:480,nav:"users.active"});}

  // 5. Offboard user
  if(active.length>1){const ou=pick(active.filter(u=>!["u06","u05"].includes(u.id)));if(ou)T.push({c:"Identity",p:"High",ti:"Offboard: "+ou.n+" — immediate termination",de:ou.n+" terminated effective immediately. Block sign-in, revoke sessions, convert mailbox to shared, and set up mail forwarding to their manager.",h:"Go to Users → select user → Block, Revoke Sessions, toggle Shared Mailbox ON.",checks:us=>{const u=us.find(x=>x.id===ou.id);return u&&u.blocked&&u.sessions===0&&u.sharedMbx},checkLabel:ou.n+": blocked + sessions=0 + shared mailbox",sla:60,nav:"users.active"});}

  // 6. Enable MFA
  if(noMfa.length>0){const mu2=pick(noMfa);T.push({c:"Security",p:"High",ti:"Enable MFA for "+mu2.n,de:mu2.n+" has no MFA registered. Security audit requires all active users to have MFA enabled. Enable Authenticator for this user.",h:"Go to Users → Active users → select user → Enable MFA button.",checks:us=>{const u=us.find(x=>x.id===mu2.id);return u&&u.mfa},checkLabel:mu2.n+": MFA enabled",sla:240,nav:"users.active"});}

  // 7. Mailbox full
  const fullMbx=users.filter(u=>u.ac&&u.mbU/u.mb>0.9);
  if(fullMbx.length>0){const fu=pick(fullMbx);T.push({c:"Exchange",p:"Critical",ti:fu.n+" mailbox full — NDRs bouncing",de:fu.n+" at "+fu.mbU+"/"+fu.mb+"GB. Emails bouncing. Enable Online Archive to fix.",h:"Go to Users → select user → toggle Archive ON.",checks:us=>{const u=us.find(x=>x.id===fu.id);return u&&u.archiveOn},checkLabel:fu.n+": archive enabled",sla:30,nav:"users.active"});}

  // 8. SP access denied
  if(active.length>0&&sp.length>0){const su=pick(active);const ss=pick(sp.filter(s=>!s.mem.includes(su.id)&&!s.owners.includes(su.id)));if(ss)T.push({c:"SharePoint",p:"High",ti:su.n+" — Access Denied on "+ss.n,de:su.n+" gets 403 on "+ss.n+" site. Project deadline tomorrow. Add them as a member.",h:"Go to SharePoint → find site → Add Member.",checks:(_,__,sps)=>{const s=sps.find(x=>x.id===ss.id);return s&&s.mem.includes(su.id)},checkLabel:su.n+" added as member to "+ss.n,sla:120,nav:"sharepoint"});}

  // 9. Teams add member
  if(active.length>0&&teams.length>0){const tu=pick(active);const tt=pick(teams.filter(t=>!t.mem.includes(tu.id)));if(tt)T.push({c:"Teams",p:"Medium",ti:"Add "+tu.n+" to "+tt.n+" team",de:tu.n+" needs access to the "+tt.n+" team for an upcoming project. Add them as a member.",h:"Go to Teams & groups → find team → Add Member.",checks:(_,tm)=>{const t=tm.find(x=>x.id===tt.id);return t&&t.mem.includes(tu.id)},checkLabel:tu.n+" added to "+tt.n,sla:120,nav:"teams"});}

  // 10. Shared mailbox access
  if(active.length>0&&mbx.length>0){const su2=pick(active);const sm=pick(mbx.filter(s=>!s.mem.includes(su2.id)));if(sm)T.push({c:"Exchange",p:"High",ti:su2.n+" can't access "+sm.n,de:su2.n+" reports shared mailbox "+sm.n+" not showing in Outlook. Grant Full Access.",h:"Go to Exchange → Shared mailboxes → find mailbox → Add Member.",checks:(_,__,___,mx)=>{const m=mx.find(x=>x.id===sm.id);return m&&m.mem.includes(su2.id)},checkLabel:su2.n+" granted access to "+sm.n,sla:120,nav:"exchange.shared"});}

  // 11. Room double-booking
  const badRoom=rooms.find(r=>r.allowConflicts);
  if(badRoom)T.push({c:"Exchange",p:"High",ti:"Room "+badRoom.n+" double-booking",de:badRoom.n+" accepted overlapping bookings. Disable AllowConflicts.",h:"Go to Exchange → Room resources → find room → set Allow Conflicts to OFF.",checks:(_,__,___,____,rm)=>{const r=rm.find(x=>x.id===badRoom.id);return r&&!r.allowConflicts},checkLabel:badRoom.n+": allowConflicts = off",sla:120,nav:"exchange.rooms"});

  // 12. SP quota exceeded
  const fullSP=sp.filter(s=>s.sz/s.qt>0.85);
  if(fullSP.length>0){const fs=pick(fullSP);T.push({c:"SharePoint",p:"Critical",ti:fs.n+" storage quota near limit",de:fs.n+" at "+fs.sz+"/"+fs.qt+"GB. Users can't upload. Increase quota to 50GB.",h:"Go to SharePoint → find site → Increase Quota (+25GB).",checks:(_,__,sps)=>{const s=sps.find(x=>x.id===fs.id);return s&&s.qt>=50},checkLabel:fs.n+": quota >= 50GB",sla:60,nav:"sharepoint"});}

  // 13. App secret expired
  const expApp=apps.find(a=>a.status.includes("EXPIRED"));
  if(expApp)T.push({c:"Identity",p:"High",ti:"App secret expired: "+expApp.name,de:expApp.name+" ("+expApp.appId+") credential expired "+expApp.secretExpiry+". Rotate the secret to restore service.",h:"Go to Identity → App registrations → find app → Rotate Secret.",checks:(_,__,___,____,_____,______,ap)=>{const a=ap.find(x=>x.id===expApp.id);return a&&a.status==="Healthy"},checkLabel:expApp.name+": status = Healthy (secret rotated)",sla:120,nav:"identity.apps"});

  // 14. Orphan app
  const orphanApp=apps.find(a=>a.owners.length===0);
  if(orphanApp)T.push({c:"Identity",p:"Medium",ti:"Assign owner to "+orphanApp.name,de:orphanApp.name+" has no owner. Security policy requires all apps to have at least one owner. Assign an appropriate owner.",h:"Go to Identity → App registrations → find app → Assign Owner.",checks:(_,__,___,____,_____,______,ap)=>{const a=ap.find(x=>x.id===orphanApp.id);return a&&a.owners.length>0},checkLabel:orphanApp.name+": has at least one owner",sla:480,nav:"identity.apps"});

  // 15. Litigation hold
  if(active.length>0){const lhu=pick(active.filter(u=>!u.litHold));if(lhu)T.push({c:"Compliance",p:"High",ti:"Litigation hold: "+lhu.n,de:"Legal requires immediate litigation hold on "+lhu.n+"'s mailbox. Active legal proceeding.",h:"Go to Users → select user → toggle Litigation Hold ON.",checks:us=>{const u=us.find(x=>x.id===lhu.id);return u&&u.litHold},checkLabel:lhu.n+": litigation hold = on",sla:60,nav:"users.active"});}

  // 16. Forwarding setup
  if(active.length>1){const fwu=pick(active.filter(u=>!u.fwd));if(fwu){const fwt=pick(active.filter(u=>u.id!==fwu.id));if(fwt)T.push({c:"Exchange",p:"Medium",ti:"Set up forwarding for "+fwu.n,de:fwu.n+" is on extended leave. Set up mail forwarding to "+fwt.n+" ("+fwt.e+").",h:"Go to Users → select user → set Forwarding address to "+fwt.e+".",checks:us=>{const u=us.find(x=>x.id===fwu.id);return u&&u.fwd&&u.fwd.length>0},checkLabel:fwu.n+": forwarding address set",sla:240,nav:"users.active"});}}

  // 17. Guest invitation stuck
  const pendGuest=guests.find(g=>g.state==="PendingAcceptance");
  if(pendGuest)T.push({c:"Identity",p:"Medium",ti:"Guest invitation stuck: "+pendGuest.n,de:pendGuest.n+" from "+pendGuest.org+" invited "+pendGuest.inv+" but still pending. Resend the invitation.",h:"Go to Users → Guest users → find guest → Resend Invitation.",checks:(_,__,___,____,_____,gs)=>{const g=gs.find(x=>x.id===pendGuest.id);return g&&g.state==="Accepted"},checkLabel:pendGuest.n+": state = Accepted",sla:480,nav:"users.guests"});

  // 18. Unblock wrongly blocked user
  const blockedNonRisky=users.filter(u=>u.blocked&&u.ri==="None");
  if(blockedNonRisky.length>0){const ub=pick(blockedNonRisky);T.push({c:"Identity",p:"Medium",ti:"Unblock "+ub.n+" — false positive",de:ub.n+" was blocked by automated policy but investigation shows false positive. Unblock their account.",h:"Go to Users → select user → Unblock.",checks:us=>{const u=us.find(x=>x.id===ub.id);return u&&!u.blocked},checkLabel:ub.n+": unblocked",sla:120,nav:"users.active"});}

  // 19. Risk remediation
  const unremedRisk=risk.filter(r=>!r.remediated&&r.level==="High");
  if(unremedRisk.length>0){const rr=pick(unremedRisk);const ru2=users.find(u=>u.id===rr.user);if(ru2)T.push({c:"Security",p:"Critical",ti:"Remediate risk: "+rr.type+" for "+(ru2.n),de:"Risk detection '"+rr.type+"' flagged for "+ru2.n+". Details: "+rr.detail+". Dismiss/confirm the risk after taking action.",h:"Go to Identity → Risk detections → find detection → Confirm Remediated.",checks:(_,__,___,____,_____,______,_______,rk)=>{const r2=rk.find(x=>x.id===rr.id);return r2&&r2.remediated},checkLabel:rr.type+" for "+ru2.n+": remediated",sla:60,nav:"identity.risk"});}

  // 20. CA policy enable
  const reportOnly=SEED_CA.filter(c=>c.st==="Report-only");
  if(reportOnly.length>0){const rc=pick(reportOnly);T.push({c:"Security",p:"Medium",ti:"Enable CA policy: "+rc.n,de:"Security review recommends moving '"+rc.n+"' from Report-only to On. The policy covers: "+rc.cond+".",h:"Go to Security → Conditional Access → find policy → toggle to On.",checks:(_,__,___,____,_____,______,_______,________,ca)=>{const c2=ca.find(x=>x.id===rc.id);return c2&&c2.st==="On"},checkLabel:rc.n+": status = On",sla:240,nav:"security.ca"});}

  return T;
}

    onboarding:{name:"🧑‍💼 New Employee Onboarding Sprint",desc:"A new employee is starting. Complete all onboarding tasks: create account, grant permissions, configure services.",tickets:[
      {c:"Identity",p:"High",ti:"Create account for "+nn,de:"Create a new cloud user account for "+nn+" in "+ndp+" with E3 license.",h:"Users → Active users → Create User.",checks:us=>us.some(u=>u.n===nn&&u.dp===ndp),checkLabel:'User "'+nn+'" exists in '+ndp,sla:120,nav:"users.active"},
      {c:"Teams",p:"Medium",ti:"Add "+nn+" to Engineering team",de:"Add the new user to the Engineering team.",h:"Teams & groups → Engineering → Add Member.",checks:(us,tm)=>{const t=tm.find(x=>x.n==="Engineering");const u=us.find(x=>x.n===nn);return t&&u&&t.mem.includes(u.id)},checkLabel:nn+" in Engineering team",sla:120,nav:"teams"},
      {c:"SharePoint",p:"Medium",ti:"Grant "+nn+" access to Engineering Hub",de:"Add the new user as member to Engineering Hub SharePoint site.",h:"SharePoint → Engineering Hub → Add Member.",checks:(us,_,sps)=>{const s=sps.find(x=>x.n==="Engineering Hub");const u=us.find(x=>x.n===nn);return s&&u&&s.mem.includes(u.id)},checkLabel:nn+" in Engineering Hub members",sla:120,nav:"sharepoint"},
      {c:"Exchange",p:"Medium",ti:"Grant "+nn+" access to support@contoso.com",de:"The new hire needs access to the support shared mailbox.",h:"Exchange → Shared mailboxes → support@contoso.com → Add Member.",checks:(us,_,__,mx)=>{const m=mx.find(x=>x.n==="support@contoso.com");const u=us.find(x=>x.n===nn);return m&&u&&m.mem.includes(u.id)},checkLabel:nn+" has access to support@contoso.com",sla:120,nav:"exchange.shared"},
      {c:"Security",p:"High",ti:"Enable MFA for "+nn,de:"All users must have MFA. Enable it for the new hire.",h:"Users → select user → Enable MFA.",checks:us=>{const u=us.find(x=>x.n===nn);return u&&u.mfa},checkLabel:nn+": MFA enabled",sla:120,nav:"users.active"},
    ]},
    security:{name:"🛡️ Security Incident Response",desc:"A security incident has been detected. Follow incident response procedures to contain and remediate.",tickets:[
      {c:"Security",p:"Critical",ti:"Block compromised account: "+((active.find(u=>u.ri!=="None"))||active[0]).n,de:"Risk detection triggered. Block sign-in immediately.",h:"Users → select user → Block Sign-in.",checks:us=>{const t=active.find(u=>u.ri!=="None")||active[0];const u=us.find(x=>x.id===t.id);return u&&u.blocked},checkLabel:"User blocked",sla:15,nav:"users.active"},
      {c:"Security",p:"Critical",ti:"Revoke sessions and reset password",de:"Revoke all active sessions and reset the password for the compromised user.",h:"Users → select user → Revoke Sessions + Reset Password.",checks:us=>{const t=active.find(u=>u.ri!=="None")||active[0];const u=us.find(x=>x.id===t.id);return u&&u.sessions===0&&u.pw===td()},checkLabel:"Sessions=0, password reset today",sla:15,nav:"users.active"},
      ...((SEED_CA.filter(c=>c.st!=="On").length>0)?[{c:"Security",p:"High",ti:"Enable all CA policies",de:"During incident, ensure all Conditional Access policies are enforced.",h:"Security → Conditional Access → toggle policies to On.",checks:(_,__,___,____,_____,______,_______,________,ca)=>ca.every(c=>c.st==="On"),checkLabel:"All CA policies = On",sla:60,nav:"security.ca"}]:[]),
      {c:"Security",p:"High",ti:"Remediate all high-risk detections",de:"Confirm remediated all high-risk identity detections.",h:"Identity → Risk detections → Confirm Remediated.",checks:(_,__,___,____,_____,______,_______,rk)=>rk.filter(r=>r.level==="High").every(r=>r.remediated),checkLabel:"All high-risk detections remediated",sla:60,nav:"identity.risk"},
    ]},
    exchange:{name:"📧 Exchange Administration",desc:"Multiple Exchange issues reported. Fix shared mailbox access, room configurations, and mailbox management.",tickets:[
      ...(mbx.length>0?[{c:"Exchange",p:"High",ti:"Grant "+active[1].n+" access to "+mbx[0].n,de:active[1].n+" needs Full Access to "+mbx[0].n+" shared mailbox.",h:"Exchange → Shared mailboxes → Add Member.",checks:(_,__,___,mx)=>{const m=mx.find(x=>x.id===mbx[0].id);return m&&m.mem.includes(active[1].id)},checkLabel:active[1].n+" in "+mbx[0].n,sla:120,nav:"exchange.shared"}]:[]),
      ...(rooms.find(r=>r.allowConflicts)?[{c:"Exchange",p:"High",ti:"Fix room double-booking",de:"A meeting room has AllowConflicts enabled. Disable it.",h:"Exchange → Room resources → toggle Allow Conflicts OFF.",checks:(_,__,___,____,rm)=>rm.every(r=>!r.allowConflicts),checkLabel:"No rooms allow conflicts",sla:120,nav:"exchange.rooms"}]:[]),
      ...(users.filter(u=>u.mbU/u.mb>0.85).length>0?[{c:"Exchange",p:"Critical",ti:"Enable archive for full mailbox",de:"A user's mailbox is near capacity. Enable online archive.",h:"Users → select user → toggle Archive ON.",checks:us=>us.filter(u=>u.mbU/u.mb>0.85).every(u=>u.archiveOn),checkLabel:"All full mailboxes have archive enabled",sla:30,nav:"users.active"}]:[]),
      {c:"Exchange",p:"Medium",ti:"Set forwarding for "+active[2].n,de:active[2].n+" is on leave. Forward mail to "+active[0].n+".",h:"Users → select user → set Forwarding.",checks:us=>{const u=us.find(x=>x.id===active[2].id);return u&&u.fwd.length>0},checkLabel:active[2].n+": forwarding set",sla:240,nav:"users.active"},
    ]},
    compliance:{name:"🔏 Compliance & Audit Preparation",desc:"Quarterly compliance audit approaching. Ensure all security and governance controls are properly configured.",tickets:[
      {c:"Security",p:"High",ti:"Ensure MFA for all active users",de:"Audit requires 100% MFA coverage for active, non-blocked users.",h:"Users → find users with MFA Off → Enable MFA for each.",checks:us=>us.filter(u=>u.ac&&!u.blocked).every(u=>u.mfa),checkLabel:"All active users have MFA",sla:480,nav:"users.active"},
      {c:"Identity",p:"High",ti:"Fix orphan app registrations",de:"All app registrations must have at least one owner.",h:"Identity → App registrations → Assign Owner to apps with no owner.",checks:(_,__,___,____,_____,______,ap)=>ap.every(a=>a.owners.length>0),checkLabel:"All apps have owners",sla:240,nav:"identity.apps"},
      {c:"Identity",p:"Medium",ti:"Rotate expired app secrets",de:"All app registration secrets must be current (not expired).",h:"Identity → App registrations → Rotate Secret for expired apps.",checks:(_,__,___,____,_____,______,ap)=>ap.every(a=>!a.status.includes("EXPIRED")),checkLabel:"No expired app secrets",sla:240,nav:"identity.apps"},
      {c:"Compliance",p:"High",ti:"Place litigation hold on Legal team",de:"Place litigation hold on the General Counsel's mailbox.",h:"Users → Lisa Tanaka → toggle Litigation Hold ON.",checks:us=>{const u=us.find(x=>x.id==="u07");return u&&u.litHold},checkLabel:"Lisa Tanaka: litigation hold = on",sla:120,nav:"users.active"},
    ]},
  };
  return S[type]||null;
}

// SHARED UI COMPONENTS

const Avatar=({name,size})=>{const s=size||32;return <div className={s<=24?"avatar avatar-sm":"avatar"} style={{width:s,height:s,fontSize:s*.38,background:avColor(name)}}>{avInit(name)}</div>};
const Badge=({type,children})=><span className={"badge badge-"+(type||"neutral")}>{children}</span>;
const Bar=({val,max,color})=>{const p=pct(val,max);const c=color||(p>85?"#d13438":p>65?"#ffb900":"#107c10");return <div style={{display:"flex",alignItems:"center",gap:8}}><div className="progress-bar"><div className="progress-fill" style={{width:p+"%",background:c}}/></div><span style={{fontSize:12,color:"var(--tx2)",whiteSpace:"nowrap"}}>{Math.round(val)}/{max} GB</span></div>};
const KV=({k,v,badge})=><div className="kv"><span className="kv-k">{k}</span><span className="kv-v">{badge?<Badge type={badge}>{v}</Badge>:v}</span></div>;
const SectionTitle=({children,icon})=><div className="section-title">{icon&&<span>{icon}</span>}{children}</div>;
const PageHeader=({title,sub})=><div><div className="page-title">{title}</div>{sub&&<div className="page-sub">{sub}</div>}</div>;

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App(){
  // ── Navigation ──
  const[page,setPage]=useState("home");
  const[navOpen,setNavOpen]=useState({});
  const[navCollapsed,setNavCollapsed]=useState(false);

  // ── Mutable tenant state ──
  const[users,setUsers]=useState(SEED_USERS.map(u=>({...u,ro:[...u.ro],devs:[...u.devs]})));
  const[guests,setGuests]=useState(SEED_GUESTS.map(g=>({...g,access:[...g.access]})));
  const[teams,setTeams]=useState(SEED_TEAMS.map(t=>({...t,ch:[...t.ch],mem:[...t.mem]})));
  const[spSites,setSP]=useState(SEED_SP.map(s=>({...s,mem:[...s.mem],visitors:[...s.visitors],owners:[...s.owners]})));
  const[sMbx,setSMbx]=useState(SEED_SHARED_MBX.map(m=>({...m,mem:[...m.mem],sendAs:[...m.sendAs]})));
  const[roomList,setRooms]=useState(SEED_ROOMS.map(r=>({...r})));
  const[caP,setCA]=useState(SEED_CA.map(c=>({...c})));
  const[dlpP,setDLP]=useState(SEED_DLP.map(d=>({...d})));
  const[pimRoles,setPIM]=useState(SEED_PIM_ROLES.map(p=>({...p,eligible:[...p.eligible],active:[...p.active]})));
  const[riskDet,setRisk]=useState(SEED_RISK.map(r=>({...r})));
  const[accessRev,setAR]=useState(SEED_ACCESS_REVIEWS.map(a=>({...a,items:a.items.map(i=>({...i}))})));
  const[appRegs,setApps]=useState(SEED_APPS.map(a=>({...a,owners:[...a.owners]})));

  // ── Tickets + Simulation ──
  const[tickets,setTickets]=useState([]);
  const[closed,setClosed]=useState([]);
  const[score,setScore]=useState({r:0,ok:0,bad:0,pt:0});
  const[auditLog,setAudit]=useState([]);
  const[alerts,setAlerts]=useState([]);
  const[toast,setToast]=useState(null);
  const[difficulty,setDifficulty]=useState("normal");
  const[speed,setSpeed]=useState(1);
  const[paused,setPaused]=useState(false);
  const[selUser,setSelUser]=useState(null);
  const[selTk,setSelTk]=useState(null);
  const[activeScenario,setActiveScenario]=useState(null);
  const[newUser,setNewUser]=useState({n:"",e:"",dp:"Engineering",ti:"",lo:"London",li:"E3"});

  // Refs for async access
  const uR=useRef(users);uR.current=users;
  const tR=useRef(teams);tR.current=teams;
  const sR=useRef(spSites);sR.current=spSites;
  const mR=useRef(sMbx);mR.current=sMbx;
  const rR=useRef(roomList);rR.current=roomList;
  const gR=useRef(guests);gR.current=guests;
  const aR=useRef(appRegs);aR.current=appRegs;
  const rkR=useRef(riskDet);rkR.current=riskDet;
  const caR=useRef(caP);caR.current=caP;
  const tkR=useRef(tickets);tkR.current=tickets;

  const nfy=useCallback((m,type)=>{setToast({m,type:type||"info",k:Date.now()});setTimeout(()=>setToast(null),3500)},[]);
  const audit=(actor,action,target,result)=>setAudit(p=>[{time:new Date().toISOString(),actor,action,target,result:result||"Success",cat:"Admin"},  ...p].slice(0,100));

  // ═══════ ADMIN ACTIONS ═══════
  const modUser=(id,changes,label)=>{setUsers(p=>p.map(u=>u.id===id?{...u,...changes}:u));audit("You",label||Object.keys(changes).join(", "),users.find(u=>u.id===id)?.n||id)};
  const createUserAction=()=>{
    if(!newUser.n.trim()||!newUser.e.trim())return nfy("Name and email are required","error");
    const id="u"+String(users.length+100);
    const u={id,n:newUser.n.trim(),e:newUser.e.trim()+"@contoso.com",dp:newUser.dp,ti:newUser.ti||"Employee",lo:newUser.lo,li:newUser.li,ac:true,mfa:false,mm:"None",ri:"None",ro:["None"],mb:newUser.li==="F3"?2:newUser.li==="E5"?100:50,mbU:0,co:"Compliant",pw:td(),src:"Cloud",sspr:false,blocked:false,sharedMbx:false,fwd:"",archiveOn:false,litHold:false,oofExt:false,sessions:0,devs:[]};
    setUsers(p=>[...p,u]);setNewUser({n:"",e:"",dp:"Engineering",ti:"",lo:"London",li:"E3"});
    nfy("User "+u.n+" created successfully","success");audit("You","Create user",u.n+" ("+u.dp+", "+u.li+")");
  };
  const addTeamMember=(tid,uid)=>{setTeams(p=>p.map(t=>t.id===tid&&!t.mem.includes(uid)?{...t,mem:[...t.mem,uid]}:t));const u=users.find(x=>x.id===uid);const t=teams.find(x=>x.id===tid);audit("You","Add team member",u?.n+" → "+t?.n);nfy("Added to team","success")};
  const rmTeamMember=(tid,uid)=>setTeams(p=>p.map(t=>t.id===tid?{...t,mem:t.mem.filter(m=>m!==uid)}:t));
  const addTeamChannel=(tid,ch)=>{if(!ch)return;setTeams(p=>p.map(t=>t.id===tid?{...t,ch:[...t.ch,ch]}:t))};
  const createTeam=(n)=>{if(!n)return;setTeams(p=>[...p,{id:"tm"+Date.now(),n,ch:["General"],mem:["u06"],prv:false,owner:"u06",guestAccess:false}]);nfy("Team created","success");audit("You","Create team",n)};
  const addSPMem=(sid,uid)=>{setSP(p=>p.map(s=>s.id===sid&&!s.mem.includes(uid)?{...s,mem:[...s.mem,uid]}:s));const u=users.find(x=>x.id===uid);const s=spSites.find(x=>x.id===sid);audit("You","Add SP member",u?.n+" → "+s?.n);nfy("Member added","success")};
  const rmSPMem=(sid,uid)=>setSP(p=>p.map(s=>s.id===sid?{...s,mem:s.mem.filter(m=>m!==uid)}:s));
  const setSPQuota=(sid,qt)=>{setSP(p=>p.map(s=>s.id===sid?{...s,qt}:s));audit("You","Increase SP quota",spSites.find(s=>s.id===sid)?.n+": +25GB");nfy("Quota increased","success")};
  const addMbxMem=(mid,uid)=>{setSMbx(p=>p.map(m=>m.id===mid&&!m.mem.includes(uid)?{...m,mem:[...m.mem,uid]}:m));const u=users.find(x=>x.id===uid);const m=sMbx.find(x=>x.id===mid);audit("You","Grant mailbox access",u?.n+" → "+m?.n);nfy("Access granted","success")};
  const rmMbxMem=(mid,uid)=>setSMbx(p=>p.map(m=>m.id===mid?{...m,mem:m.mem.filter(x=>x!==uid)}:m));
  const toggleRoomConflict=rid=>{setRooms(p=>p.map(r=>r.id===rid?{...r,allowConflicts:!r.allowConflicts}:r));audit("You","Toggle room conflicts",roomList.find(r=>r.id===rid)?.n);nfy("Room updated","success")};
  const toggleCA=cid=>{setCA(p=>p.map(c=>c.id===cid?{...c,st:c.st==="On"?"Report-only":c.st==="Report-only"?"Off":"On"}:c));audit("You","Toggle CA policy",caP.find(c=>c.id===cid)?.n);nfy("Policy updated","success")};
  const toggleDLP=did=>{setDLP(p=>p.map(d=>d.id===did?{...d,st:d.st==="Enforcing"?"Test":d.st==="Test"?"Off":"Enforcing"}:d));audit("You","Toggle DLP policy",dlpP.find(d=>d.id===did)?.n)};
  const remediateRisk=rid=>{setRisk(p=>p.map(r=>r.id===rid?{...r,remediated:true,status:"Remediated"}:r));audit("You","Remediate risk",riskDet.find(r=>r.id===rid)?.type);nfy("Risk remediated","success")};
  const dismissRisk=rid=>{setRisk(p=>p.map(r=>r.id===rid?{...r,remediated:true,status:"Dismissed"}:r));audit("You","Dismiss risk",rid)};
  const rotateAppSecret=aid=>{setApps(p=>p.map(a=>a.id===aid?{...a,secretExpiry:"2028-03-12",status:"Healthy",secretCount:a.secretCount+1}:a));audit("You","Rotate app secret",appRegs.find(a=>a.id===aid)?.name);nfy("Secret rotated","success")};
  const assignAppOwner=(aid,uid)=>{setApps(p=>p.map(a=>a.id===aid&&!a.owners.includes(uid)?{...a,owners:[...a.owners,uid],status:a.status==="No owner"?"Healthy":a.status}:a));audit("You","Assign app owner",appRegs.find(a=>a.id===aid)?.name);nfy("Owner assigned","success")};
  const resendGuestInvite=gid2=>{setGuests(p=>p.map(g=>g.id===gid2?{...g,state:"Accepted",redeemed:true,lastLogin:td()}:g));audit("You","Resend guest invite",guests.find(g=>g.id===gid2)?.n);nfy("Invitation resent & accepted","success")};
  const revokeGuest=gid2=>{setGuests(p=>p.filter(g=>g.id!==gid2));audit("You","Revoke guest access",gid2);nfy("Guest removed","success")};
  const reviewItem=(arid,uid,decision)=>{setAR(p=>p.map(a=>a.id===arid?{...a,items:a.items.map(i=>i.uid===uid?{...i,decision}:i)}:a));audit("You","Access review decision",decision+" for "+uid)};

  // ═══════ TICKET SYSTEM ═══════
  useEffect(()=>{const tpls=mkTickets(uR.current,tR.current,sR.current,mR.current,rR.current,gR.current,aR.current,rkR.current);const init=tpls.slice(0,4).map(t=>({...t,id:gid(),status:"Open",cr:Date.now(),breach:false}));setTickets(init)},[]);

  useEffect(()=>{if(paused)return;const base=difficulty==="beginner"?60000:difficulty==="expert"?15000:25000;const range=difficulty==="beginner"?30000:difficulty==="expert"?15000:25000;const iv=setInterval(()=>{if(tkR.current.filter(t=>t.status!=="Resolved").length<(difficulty==="expert"?16:12)){const tpls=mkTickets(uR.current,tR.current,sR.current,mR.current,rR.current,gR.current,aR.current,rkR.current);if(tpls.length>0){const t={...pick(tpls),id:gid(),status:"Open",cr:Date.now(),breach:false};setTickets(p=>[t,...p]);nfy("New ticket: "+t.ti.slice(0,40),"warning")}}},((base+Math.random()*range)/speed));return()=>clearInterval(iv)},[paused,speed,difficulty,nfy]);

  useEffect(()=>{const iv=setInterval(()=>{setTickets(p=>p.map(t=>{if(t.status==="Resolved")return t;if((Date.now()-t.cr)/60000>t.sla&&!t.breach)return{...t,breach:true};return t}))},3000);return()=>clearInterval(iv)},[]);

  useEffect(()=>{const iv=setInterval(()=>{setTickets(prev=>{let changed=false;const next=prev.map(t=>{if(t.status==="Resolved"||t.status==="Validated")return t;let pass=false;try{pass=t.checks(uR.current,tR.current,sR.current,mR.current,rR.current,gR.current,aR.current,rkR.current,caR.current)}catch(e){}if(pass){changed=true;return{...t,status:"Validated"}}return t});return changed?next:prev})},1500);return()=>clearInterval(iv)},[]);

  const resolveTicket=id=>{const t=tickets.find(x=>x.id===id);if(!t||t.status!=="Validated")return nfy("Complete the required action first","warning");const inSla=(Date.now()-t.cr)/60000<=t.sla;const pts=({Critical:50,High:30,Medium:20,Low:10}[t.p]||10)*(inSla?1.5:1);setTickets(p=>p.map(x=>x.id===id?{...x,status:"Resolved"}:x));setScore(p=>({r:p.r+1,ok:p.ok+(inSla?1:0),bad:p.bad+(inSla?0:1),pt:p.pt+pts}));nfy("Ticket resolved"+(inSla?" — SLA bonus!":""),"success");audit("You","Resolve ticket",id)};
  const closeTicket=id=>{const t=tickets.find(x=>x.id===id);if(!t||t.status!=="Resolved")return;setClosed(p=>[{...t,status:"Closed"},...p]);setTickets(p=>p.filter(x=>x.id!==id))};

  const launchScenario=(type)=>{const s=mkScenarioTickets(type,uR.current,tR.current,sR.current,mR.current,rR.current,gR.current,aR.current,rkR.current);if(!s)return;const newTix=s.tickets.map(t=>({...t,id:gid(),status:"Open",cr:Date.now(),breach:false,scenario:s.name}));setTickets(p=>[...newTix,...p]);setActiveScenario(s.name);nfy("Scenario launched: "+s.name,"info");setPage("sim.tickets")};

  // Computed
  const oN=tickets.filter(t=>t.status==="Open"||t.status==="Validated").length;
  const cN=tickets.filter(t=>t.p==="Critical"&&t.status!=="Resolved").length;
  const bN=tickets.filter(t=>t.breach&&t.status!=="Resolved").length;

  // ═══════ NAV SIDEBAR ═══════
  const NavSidebar=()=><div className={"sidebar"+(navCollapsed?" collapsed":"")}>
    <div style={{padding:"12px 14px",borderBottom:"1px solid #333"}}>
      <button onClick={()=>setNavCollapsed(!navCollapsed)} style={{background:"none",border:"none",color:"#e0e0e0",cursor:"pointer",fontSize:18,padding:4}}>☰</button>
    </div>
    {NAV.map(item=>{
      if(item.id.startsWith("_s"))return <div key={item.id} className="nav-sep"/>;
      const isOpen=navOpen[item.id];
      const isActive=page===item.id||(item.sub&&item.sub.some(s=>page===s.id));
      return <div key={item.id}>
        <div className={"nav-item"+(isActive?" active":"")} onClick={()=>{if(item.sub){setNavOpen(p=>({...p,[item.id]:!p[item.id]}));if(!isActive)setPage(item.sub[0].id)}else setPage(item.id)}}>
          <span className="nav-icon">{item.icon}</span>
          {!navCollapsed&&<span style={{flex:1}}>{item.label}</span>}
          {!navCollapsed&&item.sub&&<span style={{fontSize:10,color:"#888"}}>{isOpen?"▼":"▶"}</span>}
          {!navCollapsed&&item.id==="sim"&&oN>0&&<span style={{background:"var(--er)",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}}>{oN}</span>}
        </div>
        {!navCollapsed&&item.sub&&isOpen&&item.sub.map(sub=><div key={sub.id} className={"nav-item nav-sub"+(page===sub.id?" active":"")} onClick={()=>setPage(sub.id)}>{sub.label}</div>)}
      </div>
    })}
  </div>;

  // ═══════ USER DETAIL ═══════
  const UserDetail=({u})=>{if(!u)return null;return <div className="detail-panel">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div style={{display:"flex",gap:12,alignItems:"center"}}><Avatar name={u.n} size={40}/><div><div style={{fontSize:16,fontWeight:600}}>{u.n}</div><div style={{fontSize:13,color:"var(--tx2)"}}>{u.e}</div><div style={{fontSize:12,color:"var(--tx3)"}}>{u.dp} · {u.ti} · {u.lo}</div></div></div>
      <button className="btn btn-outline btn-sm" onClick={()=>setSelUser(null)}>✕ Close</button>
    </div>
    <div className="grid2" style={{marginBottom:16}}>
      <div><KV k="Account status" v={u.blocked?"Blocked":u.ac?"Active":"Disabled"} badge={u.blocked?"er":u.ac?"ok":"neutral"}/><KV k="License" v={u.li} badge="info"/><KV k="MFA" v={u.mfa?"Enabled ("+u.mm+")":"Disabled"} badge={u.mfa?"ok":"er"}/><KV k="Risk level" v={u.ri} badge={u.ri==="None"?"ok":u.ri==="High"?"er":"wn"}/><KV k="Compliance" v={u.co} badge={u.co==="Compliant"?"ok":"er"}/><KV k="Source" v={u.src}/></div>
      <div><KV k="Mailbox" v={u.mbU+"/"+u.mb+" GB"}/><KV k="Archive" v={u.archiveOn?"Enabled":"Disabled"} badge={u.archiveOn?"ok":"neutral"}/><KV k="Shared Mailbox" v={u.sharedMbx?"Yes":"No"}/><KV k="Forwarding" v={u.fwd||"None"}/><KV k="Litigation Hold" v={u.litHold?"ON":"Off"} badge={u.litHold?"wn":"neutral"}/><KV k="Active sessions" v={String(u.sessions)}/><KV k="Password changed" v={u.pw}/></div>

        :<button className="btn btn-success btn-sm" onClick={()=>{modUser(u.id,{blocked:false},"Unblock sign-in");nfy(u.n+" unblocked","success")}}>✅ Unblock</button>}
      <button className="btn btn-outline btn-sm" onClick={()=>{modUser(u.id,{sessions:0},"Revoke sessions");nfy("Sessions revoked","success")}}>🔄 Revoke Sessions</button>
      <button className="btn btn-outline btn-sm" onClick={()=>{modUser(u.id,{pw:td()},"Reset password");nfy("Password reset","success")}}>🔑 Reset Password</button>
      {u.mfa?<button className="btn btn-outline btn-sm" onClick={()=>{modUser(u.id,{mfa:false,mm:"None"},"Reset MFA");nfy("MFA cleared","success")}}>🔓 Reset MFA</button>
        :<button className="btn btn-primary btn-sm" onClick={()=>{modUser(u.id,{mfa:true,mm:"Authenticator"},"Enable MFA");nfy("MFA enabled","success")}}>🔐 Enable MFA</button>}
      <button className="btn btn-outline btn-sm" onClick={()=>{modUser(u.id,{archiveOn:!u.archiveOn},"Toggle archive");nfy("Archive "+(u.archiveOn?"disabled":"enabled"),"success")}}>📦 {u.archiveOn?"Disable":"Enable"} Archive</button>
      <button className="btn btn-outline btn-sm" onClick={()=>{modUser(u.id,{sharedMbx:!u.sharedMbx},"Toggle shared mailbox");nfy("Shared mailbox "+(u.sharedMbx?"off":"on"),"success")}}>📧 {u.sharedMbx?"Unshare":"Share"} Mailbox</button>
      <button className="btn btn-outline btn-sm" onClick={()=>{modUser(u.id,{litHold:!u.litHold},"Toggle litigation hold");nfy("Litigation hold "+(u.litHold?"removed":"placed"),"success")}}>⚖️ {u.litHold?"Remove":"Place"} Lit. Hold</button>
      <button className="btn btn-outline btn-sm" onClick={()=>{modUser(u.id,{oofExt:!u.oofExt},"Toggle OOF external");}}>✈️ OOF Ext {u.oofExt?"Off":"On"}</button>
      <select className="select" style={{width:80}} value={u.li} onChange={e=>{modUser(u.id,{li:e.target.value,mb:e.target.value==="E5"?100:e.target.value==="F3"?2:50},"Change license → "+e.target.value);nfy("License → "+e.target.value,"success")}}><option value="E5">E5</option><option value="E3">E3</option><option value="F3">F3</option></select>
      <select className="select" style={{width:110}} value={u.ri} onChange={e=>{modUser(u.id,{ri:e.target.value},"Change risk → "+e.target.value)}}><option value="None">Risk: None</option><option value="Low">Risk: Low</option><option value="Medium">Risk: Medium</option><option value="High">Risk: High</option></select>
    </div>
    <div style={{marginTop:12}}>
      <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>Set mail forwarding</div>
      <div style={{display:"flex",gap:4}}><select className="select" style={{width:220}} value={u.fwd} onChange={e=>modUser(u.id,{fwd:e.target.value},"Set forwarding → "+e.target.value)}><option value="">No forwarding</option>{users.filter(x=>x.id!==u.id&&x.ac).map(x=><option key={x.id} value={x.e}>{x.n}</option>)}</select></div>
    </div>

  // ═══════ PAGE: HOME / DASHBOARD ═══════
  const HomePage=()=><div>
    <PageHeader title="Home" sub={TN.name+" · "+TN.vanity+" · Training Simulation"}/>
    <div className="grid6" style={{marginBottom:16}}>
      {[{l:"Active users",v:users.filter(u=>u.ac).length,c:"var(--p)",click:()=>setPage("users.active")},
        {l:"Open tickets",v:oN,c:"var(--wn)",click:()=>setPage("sim.tickets")},
        {l:"Critical",v:cN,c:"var(--er)",click:()=>setPage("sim.tickets")},
        {l:"SLA Breach",v:bN,c:bN>0?"var(--sev)":"var(--ok)"},
        {l:"No MFA",v:users.filter(u=>u.ac&&!u.mfa&&!u.blocked).length,c:users.filter(u=>u.ac&&!u.mfa&&!u.blocked).length>0?"var(--er)":"var(--ok)"},
        {l:"Score",v:Math.floor(score.pt),c:"#8764b8"},
      ].map(s=><div key={s.l} className="stat-card" style={{borderTop:"3px solid "+s.c,cursor:s.click?"pointer":"default"}} onClick={s.click}><div className="stat-lbl">{s.l}</div><div className="stat-val" style={{color:s.c}}>{s.v}</div></div>)}
    </div>
    <div className="grid2">
      <div className="card"><div className="card-title">🏥 Service health</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {SVC_HEALTH.map(s=><div key={s.s} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:4,border:"1px solid var(--bdr)"}}>
            <span>{s.icon}</span><span style={{flex:1,fontSize:13}}>{s.s}</span>
            <div style={{width:8,height:8,borderRadius:"50%",background:s.st==="Operational"?"var(--ok)":s.st==="Degraded"?"var(--wn)":"var(--er)"}}/>
          </div>)}
        </div>
      </div>
      <div className="card"><div className="card-title">📊 Performance</div>
        <div className="grid3" style={{marginBottom:12}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"var(--ok)"}}>{score.ok}</div><div style={{fontSize:12,color:"var(--tx2)"}}>SLA met</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"var(--er)"}}>{score.bad}</div><div style={{fontSize:12,color:"var(--tx2)"}}>Breached</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color:"var(--p)"}}>{score.r>0?Math.round(score.ok/score.r*100):0}%</div><div style={{fontSize:12,color:"var(--tx2)"}}>Rate</div></div>
        </div>
        <KV k="Identity" v={users.filter(u=>u.ac).length+" active, "+users.filter(u=>u.blocked).length+" blocked"}/>
        <KV k="MFA coverage" v={pct(users.filter(u=>u.ac&&!u.blocked&&u.mfa).length,users.filter(u=>u.ac&&!u.blocked).length)+"%"} badge={pct(users.filter(u=>u.ac&&!u.blocked&&u.mfa).length,users.filter(u=>u.ac&&!u.blocked).length)>=80?"ok":"er"}/>
        <KV k="Risk detections" v={riskDet.filter(r=>!r.remediated).length+" un-remediated"} badge={riskDet.filter(r=>!r.remediated).length>0?"er":"ok"}/>
        <KV k="CA policies active" v={caP.filter(c=>c.st==="On").length+"/"+caP.length}/>
      </div>
    </div>
    <div className="card"><div className="card-title" style={{cursor:"pointer"}} onClick={()=>setPage("sim.tickets")}>🎫 Active tickets <span style={{fontWeight:400,fontSize:12,color:"var(--tx2)",marginLeft:8}}>→ View all</span></div>
      {tickets.filter(t=>t.status!=="Resolved").slice(0,6).map(t=><div key={t.id} className="ticket-card" onClick={()=>{setSelTk(t.id);setPage("sim.tickets")}}>
        <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.ti}</div><div style={{fontSize:12,color:"var(--tx2)"}}>{t.id} · {t.c} · {ago(Date.now()-t.cr)}</div></div>
        <Badge type={t.p==="Critical"?"er":t.p==="High"?"er":t.p==="Medium"?"wn":"ok"}>{t.p}</Badge>
        <Badge type={t.status==="Validated"?"ok":"wn"}>{t.status}</Badge>
        {t.breach&&<Badge type="er">SLA!</Badge>}
      </div>)}
    </div>
  </div>;

  // ═══════ PAGE: ACTIVE USERS ═══════
  const UsersPage=()=><div>
    <PageHeader title="Active users" sub={"Manage user accounts, licenses, and security settings · "+users.filter(u=>u.ac).length+" active users"}/>
    {selUser&&<UserDetail u={users.find(x=>x.id===selUser)}/>}

        <div className="form-group"><label className="form-label">Display name *</label><input className="input" placeholder="Full Name" value={newUser.n} onChange={e=>setNewUser(p=>({...p,n:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Username *</label><div style={{display:"flex"}}><input className="input" style={{borderRadius:"4px 0 0 4px"}} placeholder="username" value={newUser.e} onChange={e=>setNewUser(p=>({...p,e:e.target.value}))}/><span style={{padding:"6px 8px",background:"#f3f2f1",border:"1px solid var(--bdr)",borderLeft:0,borderRadius:"0 4px 4px 0",fontSize:12,color:"var(--tx2)",whiteSpace:"nowrap"}}>@contoso.com</span></div></div>
        <div className="form-group"><label className="form-label">Job title</label><input className="input" placeholder="Title" value={newUser.ti} onChange={e=>setNewUser(p=>({...p,ti:e.target.value}))}/></div>

        <div className="form-group" style={{flex:1}}><label className="form-label">License</label><select className="select" value={newUser.li} onChange={e=>setNewUser(p=>({...p,li:e.target.value}))}><option value="E5">Microsoft 365 E5</option><option value="E3">Microsoft 365 E3</option><option value="F3">Microsoft 365 F3</option></select></div>

      </div>
    </div>
    <div className="card" style={{padding:0,overflow:"auto"}}>
      <table><thead><tr><th style={{width:32}}></th><th>Display name</th><th>Department</th><th>License</th><th>Status</th><th>MFA</th><th>Risk</th><th>Mailbox</th><th></th></tr></thead>
      <tbody>{users.map(u=><tr key={u.id} style={{cursor:"pointer"}} onClick={()=>setSelUser(u.id)}>
        <td><Avatar name={u.n} size={28}/></td>

        <td><Badge type="info">{u.li}</Badge></td>

        <td><Badge type={u.mfa?"ok":"er"}>{u.mfa?"On":"Off"}</Badge></td>
        <td><Badge type={u.ri==="None"?"ok":u.ri==="High"?"er":"wn"}>{u.ri}</Badge></td>
        <td><div style={{minWidth:100}}><Bar val={u.mbU} max={u.mb}/></div></td>
        <td><button className="btn-ghost" onClick={e=>{e.stopPropagation();setSelUser(u.id)}}>Manage</button></td>
      </tr>)}</tbody></table>
    </div>
  </div>;

        <div style={{display:"flex",gap:4}}><Badge type={g.state==="Accepted"?"ok":"wn"}>{g.state}</Badge></div>
      </div>
      <div className="grid2" style={{marginTop:10}}>
        <div><KV k="Invited" v={g.inv}/><KV k="Last login" v={g.lastLogin}/><KV k="MFA" v={g.mfaStatus} badge={g.mfaStatus==="Enforced"?"ok":g.mfaStatus==="N/A"?"neutral":"er"}/></div>

  // ═══════ PAGE: TEAMS ═══════
  const TeamsPage=()=><div>
    <PageHeader title="Teams & groups" sub={"Manage Microsoft Teams · "+teams.length+" teams"}/>
    {teams.map(t=><div key={t.id} className="card" style={{borderLeft:"3px solid #7c3aed"}}>

        {t.mem.map(uid=>{const u=users.find(x=>x.id===uid);return u?<div key={uid} className="chip"><Avatar name={u.n} size={18}/>{u.n}<span className="chip-remove" onClick={()=>rmTeamMember(t.id,uid)}>✕</span></div>:null})}

      <div className="card"><div className="card-title">🔗 Sync status</div><KV k="Server" v={AAD_CONNECT.server}/><KV k="Version" v={AAD_CONNECT.version}/><KV k="Status" v={AAD_CONNECT.status} badge="ok"/><KV k="Last sync" v={fT(AAD_CONNECT.lastSync)+" ("+AAD_CONNECT.syncType+")"}/><KV k="Next sync" v={fT(AAD_CONNECT.nextSync)}/><KV k="Interval" v={AAD_CONNECT.interval+"min"}/></div>

  const AccessReviewsPage=()=><div>
    <PageHeader title="Access reviews" sub="Review and certify access permissions"/>

      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontWeight:600,fontSize:14}}>{a.name}</span><Badge type={a.status==="Completed"?"ok":a.status==="InProgress"?"wn":"neutral"}>{a.status}</Badge></div>
      <KV k="Scope" v={a.scope}/><KV k="Due" v={a.due}/><KV k="Reviewer" v={users.find(u=>u.id===a.reviewer)?.n||a.reviewer}/><KV k="Progress" v={reviewed+"/"+a.items.length+" reviewed"}/>
      {a.status!=="Completed"&&<div style={{marginTop:8}}>{a.items.map(i=><div key={i.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--bdr)"}}>

        <div style={{display:"flex",gap:4}}>

  const AppRegsPage=()=><div>

        <Badge type={a.status==="Healthy"?"ok":a.status.includes("EXPIRED")?"er":"wn"}>{a.status}</Badge>
      </div>
      <KV k="Secrets" v={a.secretCount+" (expires: "+a.secretExpiry+")"} badge={a.status.includes("EXPIRED")?"er":"neutral"}/><KV k="Certificates" v={a.certCount.toString()}/><KV k="Owners" v={a.owners.length>0?a.owners.map(id=>users.find(u=>u.id===id)?.n||id).join(", "):"⚠ None"} badge={a.owners.length>0?"ok":"er"}/><KV k="Permissions" v={a.perms}/>
      <div style={{display:"flex",gap:4,marginTop:8}}>

      </div>
    </div>)}
  </div>;

  // ═══════ SECURITY PAGES ═══════
  const AlertsPage=()=><div>
    <PageHeader title="Security alerts" sub="Active security alerts and risk notifications"/>
    {riskDet.filter(r=>!r.remediated).length===0&&<div className="card" style={{textAlign:"center",color:"var(--tx2)"}}>No active security alerts ✅</div>}

      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontWeight:600}}>{r.type}</span><Badge type={r.level==="High"?"er":"wn"}>{r.level} risk</Badge></div>
      <div style={{fontSize:13,color:"var(--tx2)"}}>{r.detail}</div>
      <div style={{fontSize:12,color:"var(--tx3)",marginTop:4}}>User: {u?.n} · {fT(r.time)}</div>
      <div style={{display:"flex",gap:4,marginTop:8}}><button className="btn btn-success btn-sm" onClick={()=>remediateRisk(r.id)}>Confirm Remediated</button><button className="btn btn-outline btn-sm" onClick={()=>dismissRisk(r.id)}>Dismiss</button></div>
    </div>})}
  </div>;

  const CAPage=()=><div>
    <PageHeader title="Conditional Access" sub="Manage access policies for your organization"/>
    {caP.map(c=><div key={c.id} className="card" style={{borderLeft:"3px solid "+(c.st==="On"?"var(--ok)":c.st==="Off"?"var(--er)":"var(--wn)")}}>

    </div>)}
  </div>;

  const DLPPage=()=><div>
    <PageHeader title="Data Loss Prevention" sub="Protect sensitive data across Microsoft 365"/>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{fontWeight:600}}>{d.n}</span><div style={{fontSize:12,color:"var(--tx2)"}}>{d.loc}</div></div>

  const CompliancePage=()=><div>

      <div className="card"><div className="card-title">🏷️ Sensitivity labels</div>{[{l:"Public",c:"var(--ok)",v:340},{l:"Internal",c:"var(--p)",v:1250},{l:"Confidential",c:"var(--wn)",v:420},{l:"Highly Confidential",c:"var(--er)",v:85}].map(s=><div key={s.l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--bdr)"}}><span style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:2,background:s.c}}/>{s.l}</span><span style={{color:"var(--tx2)"}}>{s.v} items</span></div>)}</div>
      <div className="card"><div className="card-title">📦 Retention policies</div>{[{n:"Default 7-year retention",s:"Exchange, SharePoint, OneDrive"},{n:"Finance 10-year retention",s:"Finance SharePoint site"},{n:"Legal hold policy",s:"Legal team mailboxes"}].map(r=><div key={r.n} style={{padding:"6px 0",borderBottom:"1px solid var(--bdr)"}}><div style={{fontWeight:600,fontSize:13}}>{r.n}</div><div style={{fontSize:12,color:"var(--tx2)"}}>{r.s}</div></div>)}</div>
    </div>
  </div>;

  // ═══════ DEVICES PAGE ═══════
  const DevicesPage=()=><div>
    <PageHeader title="Devices" sub="Microsoft Intune — device compliance overview"/>
    <div className="grid3" style={{marginBottom:16}}>
      <div className="stat-card" style={{borderTop:"3px solid var(--ok)"}}><div className="stat-lbl">Compliant</div><div className="stat-val" style={{color:"var(--ok)"}}>{users.filter(u=>u.co==="Compliant").length}</div></div>
      <div className="stat-card" style={{borderTop:"3px solid var(--er)"}}><div className="stat-lbl">Non-compliant</div><div className="stat-val" style={{color:"var(--er)"}}>{users.filter(u=>u.co!=="Compliant").length}</div></div>

    </div>

    <tbody>{users.filter(u=>u.devs.length>0).map(u=><tr key={u.id}><td style={{fontWeight:600}}>{u.n}</td><td style={{fontSize:12}}>{u.devs.join(", ")}</td><td><Badge type={u.co==="Compliant"?"ok":"er"}>{u.co}</Badge></td></tr>)}</tbody></table></div>
  </div>;

  // ═══════ LICENSES PAGE ═══════
  const LicensesPage=()=><div>
    <PageHeader title="Licenses" sub="License assignments and availability"/>
    <div className="grid2">{LICENSES.map(l=>{const used=users.filter(u=>u.li===l.sku).length;return <div key={l.id} className="card">
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontWeight:600}}>{l.n}</span><span style={{fontSize:12,color:"var(--tx2)"}}>{l.c}</span></div>

    <tbody>{SVC_HEALTH.map(s=><tr key={s.s}><td>{s.icon}</td><td style={{fontWeight:600}}>{s.s}</td><td><Badge type={s.st==="Operational"?"ok":s.st==="Degraded"?"wn":"er"}>{s.st}</Badge></td></tr>)}</tbody></table></div>
  </div>;

  // ═══════ AUDIT LOG PAGE ═══════
  const AuditPage=()=><div>
    <PageHeader title="Audit log" sub={"Recent administrative actions · "+auditLog.length+" entries"}/>

    <div className="card" style={{padding:0,overflow:"auto"}}><table><thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Target</th><th>Result</th></tr></thead>

  // ═══════ TICKET QUEUE ═══════
  const TicketQueue=()=><div>
    <PageHeader title={"Ticket queue"+(activeScenario?" — "+activeScenario:"")} sub={"Resolve tickets by performing the requested actions in the Admin panels · "+oN+" open"}/>
    <div className="card" style={{background:"#cce4f6",border:"1px solid #0078d4",color:"#004578",fontSize:13,padding:12}}>💡 <strong>How it works:</strong> Read each ticket's requirements, navigate to the relevant admin panel to perform the action, and the ticket will <strong>auto-validate</strong> when the required state change is detected. Green "Validated" = ready to resolve.</div>
    {selTk&&<TicketDetail/>}
    {!selTk&&<>{tickets.filter(t=>t.status!=="Resolved").length===0&&<div className="card" style={{textAlign:"center",color:"var(--tx2)",padding:32}}>No open tickets 🎉</div>}
    {tickets.sort((a,b)=>({Open:0,Validated:0,Resolved:2}[a.status]-{Open:0,Validated:0,Resolved:2}[b.status])||({Critical:0,High:1,Medium:2,Low:3}[a.p]-{Critical:0,High:1,Medium:2,Low:3}[b.p])).map(t=><div key={t.id} className="ticket-card" onClick={()=>setSelTk(t.id)}>
      <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.ti}</div><div style={{fontSize:12,color:"var(--tx2)"}}>{t.id} · {t.c} · {ago(Date.now()-t.cr)}{t.scenario&&<Badge type="info" style={{marginLeft:4}}>Scenario</Badge>}</div></div>
      <Badge type={t.p==="Critical"||t.p==="High"?"er":t.p==="Medium"?"wn":"ok"}>{t.p}</Badge>
      <Badge type={t.status==="Validated"?"ok":t.status==="Resolved"?"ok":"wn"}>{t.status}</Badge>
      {t.breach&&<Badge type="er">SLA!</Badge>}
      {t.status==="Validated"&&<button className="btn btn-success btn-sm" onClick={e=>{e.stopPropagation();resolveTicket(t.id)}}>Resolve ✓</button>}
      {t.status==="Resolved"&&<button className="btn btn-outline btn-sm" onClick={e=>{e.stopPropagation();closeTicket(t.id)}}>Close</button>}
    </div>)}</>}
  </div>;

  // ═══════ TICKET DETAIL ═══════
  const TicketDetail=()=>{const t=tickets.find(x=>x.id===selTk);if(!t)return <div><button className="btn btn-outline" onClick={()=>setSelTk(null)}>← Back to queue</button><div style={{padding:20,color:"var(--tx2)"}}>Ticket not found</div></div>;
    const el=(Date.now()-t.cr)/60000;
    return <div>
      <button className="btn btn-outline" onClick={()=>setSelTk(null)} style={{marginBottom:12}}>← Back to queue</button>
      <div className="detail-panel" style={{borderLeftColor:t.p==="Critical"||t.p==="High"?"var(--er)":t.p==="Medium"?"var(--wn)":"var(--ok)"}}>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
          <span style={{fontSize:12,color:"var(--tx3)",fontFamily:"monospace"}}>{t.id}</span>
          <Badge type={t.p==="Critical"||t.p==="High"?"er":t.p==="Medium"?"wn":"ok"}>{t.p}</Badge>
          <Badge type={t.status==="Validated"||t.status==="Resolved"?"ok":"wn"}>{t.status}</Badge>
          <Badge type="info">{t.c}</Badge>
          {t.breach?<span className="sla-timer" style={{background:"#fde7e9",color:"var(--er)"}}>⚠ SLA BREACH</span>

        </div>
        <h3 style={{margin:"0 0 12px",fontSize:16}}>{t.ti}</h3>
        <div style={{padding:12,background:"#faf9f8",borderRadius:4,fontSize:13,lineHeight:1.6,marginBottom:12,border:"1px solid var(--bdr)"}}>
          <div style={{fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"var(--tx2)",marginBottom:4}}>Description</div>{t.de}
        </div>
        <div style={{padding:12,background:"#cce4f6",borderRadius:4,fontSize:13,borderLeft:"3px solid var(--p)",marginBottom:12}}>
          <div style={{fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"var(--p)",marginBottom:4}}>How to resolve</div>{t.h}
        </div>
        <div style={{padding:12,background:t.status==="Validated"?"#dff6dd":t.status==="Resolved"?"#dff6dd":"#fff4ce",borderRadius:4,border:"1px solid "+(t.status==="Validated"||t.status==="Resolved"?"#107c10":"#ffb900"),marginBottom:12}}>
          <div style={{fontWeight:600,color:t.status==="Validated"||t.status==="Resolved"?"var(--ok)":"#835b00"}}>{t.status==="Validated"?"✅ VALIDATED — Action completed!":t.status==="Resolved"?"✅ RESOLVED":"⏳ PENDING — Perform the action in the Admin panel"}</div>

        </div>

          {t.status==="Validated"&&<button className="btn btn-success" style={{flex:1}} onClick={()=>resolveTicket(t.id)}>✅ Resolve Ticket</button>}

        </div>
      </div>
    </div>};

    </div>
    <div className="grid2">
      <div className="card"><div className="card-title">📈 Metrics</div>
        <KV k="SLA compliance rate" v={(score.r>0?Math.round(score.ok/score.r*100):0)+"%"} badge={score.r>0&&score.ok/score.r>=0.8?"ok":"wn"}/>
        <KV k="MFA coverage" v={pct(users.filter(u=>u.ac&&!u.blocked&&u.mfa).length,users.filter(u=>u.ac&&!u.blocked).length)+"%"} badge={pct(users.filter(u=>u.ac&&!u.blocked&&u.mfa).length,users.filter(u=>u.ac&&!u.blocked).length)>=80?"ok":"er"}/>
        <KV k="Un-remediated risks" v={riskDet.filter(r=>!r.remediated).length.toString()} badge={riskDet.filter(r=>!r.remediated).length===0?"ok":"er"}/>
        <KV k="Orphan apps" v={appRegs.filter(a=>a.owners.length===0).length.toString()} badge={appRegs.filter(a=>a.owners.length===0).length===0?"ok":"er"}/>
        <KV k="Expired secrets" v={appRegs.filter(a=>a.status.includes("EXPIRED")).length.toString()} badge={appRegs.filter(a=>a.status.includes("EXPIRED")).length===0?"ok":"er"}/>
        <KV k="CA policies enforced" v={caP.filter(c=>c.st==="On").length+"/"+caP.length}/>
      </div>
      <div className="card"><div className="card-title">📁 Closed tickets ({closed.length})</div>
        {closed.length===0&&<div style={{color:"var(--tx2)",fontSize:13}}>No closed tickets yet</div>}
        {closed.slice(0,10).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid var(--bdr)",fontSize:12}}><span>{t.id}</span><span style={{color:"var(--tx2)"}}>{t.ti.slice(0,40)}</span></div>)}
      </div>
    </div>
  </div>;

  // ═══════ PAGE ROUTER ═══════
  const pageMap={
    "home":HomePage,"users.active":UsersPage,"users.guests":GuestsPage,
    "teams":TeamsPage,"sharepoint":SharePointPage,
    "exchange.shared":ExchangeSharedPage,"exchange.rooms":ExchangeRoomsPage,
    "identity.connect":EntraConnectPage,"identity.pim":PIMPage,"identity.sspr":SSPRPage,
    "identity.authmethods":AuthMethodsPage,"identity.namedlocs":NamedLocsPage,
    "identity.risk":RiskPage,"identity.reviews":AccessReviewsPage,"identity.apps":AppRegsPage,
    "security.alerts":AlertsPage,"security.ca":CAPage,"security.dlp":DLPPage,
    "compliance":CompliancePage,"devices":DevicesPage,"licenses":LicensesPage,
    "health":HealthPage,"reports":AuditPage,
    "sim.tickets":TicketQueue,"sim.scenarios":ScenariosPage,"sim.score":ScorePage,
  };
  const currentPage=pageMap[page]||HomePage;

  // ═══════ ROOT LAYOUT ═══════
  return <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
    {/* Simulation banner */}
    <div className="sim-banner">
      <span>🎓 <strong>Training Simulation Mode</strong> — All data is simulated. No real changes are being made.</span>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:11}}>Difficulty:</span>
        <select style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:3,fontSize:11,padding:"2px 6px",cursor:"pointer"}} value={difficulty} onChange={e=>setDifficulty(e.target.value)}><option value="beginner" style={{color:"#000"}}>Beginner</option><option value="normal" style={{color:"#000"}}>Normal</option><option value="expert" style={{color:"#000"}}>Expert</option></select>
        <span style={{fontSize:11}}>Speed:</span>
        {[1,2,3].map(s=><button key={s} onClick={()=>setSpeed(s)} style={{background:speed===s?"#fff":"rgba(255,255,255,.15)",color:speed===s?"var(--p)":"#fff",border:"none",borderRadius:3,padding:"2px 8px",cursor:"pointer",fontSize:11,fontWeight:600}}>{s}x</button>)}
        <button onClick={()=>setPaused(!paused)} style={{background:paused?"var(--ok)":"var(--wn)",color:paused?"#fff":"#000",border:"none",borderRadius:3,padding:"2px 8px",cursor:"pointer",fontSize:11,fontWeight:600}}>{paused?"▶ Resume":"⏸ Pause"}</button>
      </div>
    </div>
    {/* Top bar */}
    <div className="topbar">
      <div className="logo">
        <svg viewBox="0 0 23 23" width="20" height="20"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="12" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="12" width="10" height="10" fill="#00a4ef"/><rect x="12" y="12" width="10" height="10" fill="#ffb900"/></svg>
        Microsoft 365 admin center
      </div>
      <div className="search"><input placeholder="Search users, settings, and more..."/></div>
      <div className="topbar-right">
        <button className="topbar-btn" title="Notifications" onClick={()=>setPage("sim.tickets")}>🔔{oN>0&&<div className="badge-dot"/>}</button>
        <button className="topbar-btn" title="Settings">⚙️</button>
        <button className="topbar-btn" title="Help">❓</button>
        <div className="avatar" style={{width:32,height:32,fontSize:12,background:"var(--p)",cursor:"pointer"}} title="IT Admin (You)">IT</div>
      </div>
    </div>
    {/* Body */}
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <NavSidebar/>
      <div className="content">{currentPage()}</div>
    </div>
    {/* Toast */}
    {toast&&<div className="toast" style={{background:toast.type==="success"?"var(--ok)":toast.type==="error"?"var(--er)":toast.type==="warning"?"var(--wn)":"var(--p)"}}>{toast.m}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
